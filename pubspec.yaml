name: kiosco_au
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  animate_do: ^4.2.0
  audioplayers: ^6.6.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5

dev_dependencies:
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  isar_community_generator: ^3.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/img/ads/
    - .env

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
        # - asset: assets/fonts/Montserrat-Italic-VariableFont_wght.ttf
